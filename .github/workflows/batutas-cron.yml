name: Batutas deposit cron

# Runs the deposit tick in GitHub's cloud, 1x/day, independent of any local PC.
# This path runs the ORIGINAL 100 wallets stored in the WALLETS_JSON secret.
# Each run: 100 wallets x 0.001 CELO deposit = 100 unique addresses => DAU 100.
# A separate LOCAL cron (register-cron.ps1, 15:00) runs 500 more wallets, so the
# combined daily unique total is 600. Do NOT overwrite the WALLETS_JSON secret —
# the original 100 private keys cannot be recovered if lost.
#
# WALLETS_JSON secret = full contents of the original secrets/wallets.json
# (the 100 wallet private keys). The funder key is NOT needed here.

on:
  schedule:
    # One run per day at 00:00 UTC => 100 unique addresses/day (the old wallets).
    - cron: "0 0 * * *"
  workflow_dispatch: {} # manual "Run workflow" button

# Never run two ticks at once (avoids nonce clashes if a run overlaps).
concurrency:
  group: batutas-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: batutas-sc/cron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Restore wallets from secret
        env:
          WALLETS_JSON: ${{ secrets.WALLETS_JSON }}
        run: |
          if [ -z "$WALLETS_JSON" ]; then
            echo "::error::Missing WALLETS_JSON secret. Set it with: gh secret set WALLETS_JSON < secrets/wallets.json"
            exit 1
          fi
          mkdir -p secrets
          printf '%s' "$WALLETS_JSON" > secrets/wallets.json

      - name: Run deposit tick
        run: node tick.js
