specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Batutas
    network: celo
    source:
      address: "0x18e3B8359ad9f6C926B53ED2D432CCdc576c3Ebf"
      abi: Batutas
      startBlock: 68940769
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Player
        - Round
        - Deposit
        - Withdrawal
        - GlobalStat
      abis:
        - name: Batutas
          file: ./abis/Batutas.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Committed(indexed address,bytes32,uint256)
          handler: handleCommitted
        - event: Revealed(indexed address,uint8,uint8,uint8,uint256,uint256)
          handler: handleRevealed
        - event: Withdrawn(indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: Refunded(indexed address,uint256)
          handler: handleRefunded
      file: ./src/batutas.ts
